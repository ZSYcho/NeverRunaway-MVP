            background: linear-gradient(180deg, rgba(30,41,59,0.5) 0%, rgba(15,23,42,0.6) 100%);

            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 1.5rem;

        .dark-input {
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; focus:outline-none;

        function t(key) { return i18nDict[curLang][key] !== undefined ? i18nDict[curLang][key] : key; }

        function renderDOMTranslate() {
            document.title = t('title');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (el.tagName === 'INPUT') el.placeholder = t(key);
                else el.innerHTML = t(key);
            });
            
            // Re-render dynamic parts
            if (currentTab === 'user') {
                 if (merchantList.length === 0) document.getElementById('storeGrid').innerHTML = `<div class="text-slate-500 py-10 w-full text-center col-span-full">${t('no_stores')}</div>`;
                 else loadStoreList(); // Fetch again to re-render texts
            } else {
                 if (document.getElementById('merchantContent').innerHTML.includes('...')) {
                    document.getElementById('merchantContent').innerHTML = `<div class="text-center text-slate-500 py-20 glass-card">${t('please_connect_merchant')}</div>`;
                 } else {
                    initMerchantView(); // Re-render logic
                 }
            }
        }

        function toggleLanguage() {
            curLang = curLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('nr_lang', curLang);
            renderDOMTranslate();
        }

        // ================= TAB LOGIC =================
        function switchTab(tab) {
            currentTab = tab;
            const btnUser = document.getElementById('tabUser');
            const btnMerchant = document.getElementById('tabMerchant');
            const viewUser = document.getElementById('viewUser');
            const viewMerchant = document.getElementById('viewMerchant');

            if (tab === 'user') {
                btnUser.className = "relative z-10 px-8 py-3 rounded-xl font-medium transition-all text-sm md:text-base text-white bg-indigo-500/20 text-indigo-300";
                btnMerchant.className = "relative z-10 px-8 py-3 rounded-xl font-medium transition-all text-sm md:text-base text-slate-400 hover:text-white";
                viewUser.classList.remove('hidden'); viewMerchant.classList.add('hidden');
                loadStoreList();
            } else {
                btnMerchant.className = "relative z-10 px-8 py-3 rounded-xl font-medium transition-all text-sm md:text-base text-white bg-indigo-500/20 text-indigo-300";
                btnUser.className = "relative z-10 px-8 py-3 rounded-xl font-medium transition-all text-sm md:text-base text-slate-400 hover:text-white";
                viewMerchant.classList.remove('hidden'); viewUser.classList.add('hidden');
                initMerchantView();
            }
        }

        // ================= WALLET LOGIC =================
        async function connectWallet() {
            if (!window.ethereum) { Swal.fire(t('w_miss_env'), t('w_install_mm'), 'warning'); return; }
            try {
                showLoading('...');
                provider = new ethers.BrowserProvider(window.ethereum);
                const network = await provider.getNetwork();
                // Sepolia ChainID = 11155111
                if(network.chainId !== 11155111n) {
                    try {
                        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0xaa36a7' }] });
                        provider = new ethers.BrowserProvider(window.ethereum); 
                    } catch (switchError) {
                        hideLoading();
                        Swal.fire(t('w_net_err'), t('w_switch_sepolia'), 'error');
                        return;
                    }
                }
                const accounts = await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                userAddress = await signer.getAddress();
                
                document.getElementById('walletAddressText').innerText = formatAddr(userAddress);
                document.getElementById('walletBtn').removeAttribute('data-i18n'); // prevent override
                document.getElementById('walletBtn').classList.add('from-emerald-500', 'to-teal-500');
                
                hideLoading();
                Toast.fire({ icon: 'success', title: t('w_connected') });
                
                if (currentTab === 'user') loadStoreList();
                else initMerchantView();
                
            } catch (error) {
                hideLoading();
                console.error(error);
                Toast.fire({ icon: 'error', title: t('w_rejected') });
            }
        }

        // ================= USER FLOW =================
        async function loadStoreList() {
            try {
                const res = await axios.get(`${API_BASE}/merchant/list`);
                merchantList = res.data.data;
                const grid = document.getElementById('storeGrid');
                if(merchantList.length === 0) {
                    grid.innerHTML = `<div class="text-slate-500 py-10 w-full text-center col-span-full">${t('no_stores')}</div>`;
                    return;
                }
                
                let html = '';
                for (let store of merchantList) {
                    let userCreditHTML = '';
                    if(signer && store.contract_address) {
                        try {
                           const contract = new ethers.Contract(store.contract_address, STORE_ABI, provider);
                           const creditInfo = await contract.getUserCredit(userAddress);
                           const credit = ethers.formatUnits(creditInfo, 6);
                           
                           if(Number(credit) > 0) {
                               userCreditHTML = `
                               <div class="mt-4 p-3 bg-indigo-500/10 border border-indigo-500/30 rounded-lg">
                                    <div class="flex justify-between text-sm mb-2">
                                        <span class="text-indigo-300">${t('my_available_credit')}</span>
                                        <span class="font-bold text-white">${credit} USDC</span>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="reqConsumeCode('${store.wallet_address}', ${credit})" class="flex-1 primary-btn py-1.5 text-xs">${t('show_verify_code')}</button>
                                        <button onclick="doRefund('${store.contract_address}')" class="secondary-btn py-1.5 text-xs px-3">${t('refund')}</button>
                                    </div>
                               </div>`;
                           }
                        } catch(e) { console.error("Error reading contract", e); }
                    }

                    // store.store_name remains untranslated per user instruction
                    html += `
                        <div class="glass-card p-6 flex flex-col h-full relative overflow-hidden group">
                            <h3 class="text-2xl font-bold mb-1 group-hover:text-indigo-400 transition-colors">${store.store_name}</h3>
                            <p class="text-sm text-slate-400 mb-6 flex-1 break-all">${store.store_address}</p>
                            
                            <div class="space-y-3 mt-auto">
                                <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                                   <div class="flex justify-between text-sm"><span>${t('deposit_x_get_y')}</span> <span class="text-green-400 font-bold">${t('get_y_credit')}</span></div>
                                </div>
                                <button onclick="doDeposit('${store.contract_address}', 10)" class="w-full secondary-btn">${t('secure_deposit')}</button>
                                ${userCreditHTML}
                            </div>
                        </div>
                    `;
                }
                grid.innerHTML = html;
            } catch (error) {
                console.error("Load list error", error);
            }
        }

        async function doDeposit(contractAddress, amountUSD) {
            if (!signer) return Toast.fire({ icon: 'warning', title: t('connect_wallet') });
            try {
                showLoading(t('w_auth_usdc'));
                const amount = ethers.parseUnits(amountUSD.toString(), 6);
                const usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
                const storeContract = new ethers.Contract(contractAddress, STORE_ABI, signer);
                
                const tx1 = await usdcContract.approve(contractAddress, amount);
                await tx1.wait();
                
                showLoading(t('w_interact'));
                const tx2 = await storeContract.userDeposit(amount);
                await tx2.wait();
                
                Swal.fire(t('success'), t('w_dep_success'), 'success');
                loadStoreList(); 
            } catch (err) {
                hideLoading();
                Swal.fire(t('w_fail'), err.message.slice(0, 50), 'error');
            }
        }

        async function doRefund(contractAddress) {
            try {
                showLoading(t('w_refunding'));
                const storeContract = new ethers.Contract(contractAddress, STORE_ABI, signer);
                const tx = await storeContract.userRefund();
                await tx.wait();
                Swal.fire('OK', t('w_refund_succ'), 'success');
                loadStoreList();
            } catch(err) {
                hideLoading();
                Swal.fire(t('w_fail'), t('w_refund_fail') + ' ' + (err.reason || ''), 'error');
            }
        }

        async function reqConsumeCode(merchantWallet, maxAmount) {
            const { value: amount } = await Swal.fire({
                title: t('w_enter_amount'),
                input: 'number',
                inputPlaceholder: `${t('w_max')} ${maxAmount}`,
                background: '#1e293b',
                color: '#f8fafc',
                showCancelButton: true
            });
            if (!amount || amount <= 0 || amount > maxAmount) return;
            
            try {
                showLoading(t('w_gen_code'));
                const num = parseFloat(amount.toString());
                const res = await axios.post(`${API_BASE}/consume/generate`, {
                    user_wallet: userAddress, merchant_wallet: merchantWallet, consume_amount: num * 1000000 
                });
                if(res.data.code === 0) {
                    hideLoading();
                    Swal.fire({
                        title: t('w_show_cashier'),
                        html: `<div class="text-5xl font-mono tracking-widest text-indigo-400 font-bold my-4">${res.data.verify_code}</div><p class="text-sm">${t('w_valid_amount')} ${amount} USDC</p>`,
                        icon: 'info'
                    });
                } else { Swal.fire(t('w_err_code'), res.data.msg, 'error'); }
            } catch(e) { hideLoading(); }
        }

        // ================= MERCHANT FLOW =================
        async function initMerchantView() {
            if (!signer) return;
            const res = await axios.get(`${API_BASE}/merchant/list`);
            const allMerchants = res.data.data;
            const myMerchant = allMerchants.find(m => m.wallet_address.toLowerCase() === userAddress.toLowerCase());
            const content = document.getElementById('merchantContent');
            
            if(!myMerchant) {
                content.innerHTML = `
                <div class="glass-card p-8 space-y-6">
                    <h2 class="text-2xl font-bold">${t('reg_title')}</h2>
                    <input id="regName" type="text" class="dark-input border border-slate-700" placeholder="${t('reg_name_ph')}">
                    <input id="regAddr" type="text" class="dark-input border border-slate-700" placeholder="${t('reg_addr_ph')}">
                    <input id="regLic" type="text" class="dark-input border border-slate-700" placeholder="${t('reg_lic_ph')}">
                    <button onclick="registerAsMerchant()" class="w-full primary-btn">${t('reg_btn')}</button>
                </div>`;
            } else {
                try {
                    const contract = new ethers.Contract(myMerchant.contract_address, STORE_ABI, provider);
                    const withdrawableInfo = await contract.merchantWithdrawable();
                    const lockedInfo = await contract.totalLocked();
                    const wNum = ethers.formatUnits(withdrawableInfo, 6);
                    const lNum = ethers.formatUnits(lockedInfo, 6);

                    content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="glass-card p-6 space-y-4 shadow-indigo-900/10">
                            <h2 class="text-xl font-bold text-indigo-300">${t('asset_console')}</h2>
                            <div class="p-4 bg-slate-900/50 rounded-xl">
                                <div class="text-sm text-slate-400">${t('withdrawable')}</div>
                                <div class="text-3xl font-mono font-bold mt-1 text-green-400">${wNum}</div>
                                <button onclick="merchantWithdraw('${myMerchant.contract_address}')" class="mt-4 primary-btn w-full text-sm">${t('withdraw_btn')}</button>
                            </div>
                            <div class="p-4 bg-slate-900/50 rounded-xl">
                                <div class="text-sm text-slate-400">${t('locked_funds')}</div>
                                <div class="text-2xl font-mono font-bold mt-1">${lNum}</div>
                            </div>
                            <div class="text-xs text-slate-500 break-all">${t('contract_addr')}${myMerchant.contract_address}</div>
                        </div>
                        <div class="glass-card p-6 space-y-6">
                            <h2 class="text-xl font-bold text-purple-400">${t('cashier')}</h2>
                            <p class="text-sm text-slate-400">${t('cashier_desc')}</p>
                            <input id="cashierCode" type="text" class="dark-input text-center text-3xl font-mono tracking-widest py-4 bg-slate-900" placeholder="${t('cashier_ph')}" maxlength="6">
                            <button onclick="verifyAndConsume('${myMerchant.contract_address}')" class="w-full primary-btn from-purple-600 to-pink-600 shadow-purple-500/40">${t('consume_btn')}</button>
                        </div>
                    </div>`;
                } catch(e) { console.error('fetch merchant assets failed'); }
            }
        }

        async function registerAsMerchant() {
            const store_name = document.getElementById('regName').value;
            const store_address = document.getElementById('regAddr').value;
            const license_no = document.getElementById('regLic').value;
            if(!store_name || !store_address) return Swal.fire(t('w_need_info'), t('w_fill_info'), 'info');

            try {
                showLoading(t('w_saving_info'));
                await axios.post(`${API_BASE}/merchant/register`, { wallet_address: userAddress, store_name, store_address, license_no });
                showLoading(t('w_deploy_prompt'));
                const factoryContract = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, signer);
                const depositArr = [ethers.parseUnits("10", 6)];
                const creditArr = [ethers.parseUnits("12", 6)];
                const tx = await factoryContract.createStoreContract(365, depositArr, creditArr);
                await tx.wait(); 
                const stores = await factoryContract.getMerchantContracts(userAddress);
                const storeAddr = stores[stores.length - 1]; 

                showLoading(t('w_deploy_succ'));
                await axios.post(`${API_BASE}/merchant/bind-contract`, { contract_address: storeAddr, wallet_address: userAddress });

                Swal.fire(t('w_reg_succ_title'), t('w_reg_succ'), 'success');
                initMerchantView(); 
            } catch(e) { hideLoading(); Swal.fire(t('w_fail'), e.message, 'error'); }
        }

        async function verifyAndConsume(contractAddress) {
            const code = document.getElementById('cashierCode').value;
            if(!code || code.length !== 6) return Toast.fire({icon:'warning', title: t('w_enter_code')});

            try {
                showLoading(t('w_veri_code'));
                const res = await axios.post(`${API_BASE}/consume/verify`, { verify_code: code, merchant_wallet: userAddress });

                if(res.data.code !== 0) return Swal.fire(t('w_no_code'), res.data.msg, 'error');
                const consumeAmountRaw = res.data.data.consume_amount;
                const userWallet = res.data.data.user_wallet;

                showLoading(`${t('w_consume_call')} (${consumeAmountRaw/1000000} USDC)`);
                const storeContract = new ethers.Contract(contractAddress, STORE_ABI, signer);
                const tx = await storeContract.userConsume(userWallet, consumeAmountRaw);
                await tx.wait();

                Swal.fire(t('w_fund_safe'), t('w_fund_safe_desc'), 'success');
                document.getElementById('cashierCode').value = '';
                initMerchantView();
            } catch(e) { hideLoading(); Swal.fire(t('w_fail'), e.reason||e.message, 'error'); }
        }

        async function merchantWithdraw(contractAddress) {
            try {
                showLoading(t('w_withdrawing'));
                const storeContract = new ethers.Contract(contractAddress, STORE_ABI, signer);
                const tx = await storeContract.merchantWithdraw();
                await tx.wait();
                Swal.fire(t('success'), t('w_withdraw_succ'), 'success');
                initMerchantView();
            } catch(e) { hideLoading(); Swal.fire(t('w_fail'), e.reason || e.message, 'error'); }
        }

        // Init
        document.addEventListener('DOMContentLoaded', renderDOMTranslate);
    </script>
</body>
</html>
