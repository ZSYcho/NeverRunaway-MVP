        // 1. 连接MetaMask钱包
        async function connectWallet() {
            if (!window.ethereum) {
                alert("请安装MetaMask钱包");
                return;
            }
            provider = new ethers.BrowserProvider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            userAddress = await signer.getAddress();
            document.getElementById("walletAddress").innerText = userAddress;
            // 加载门店列表
            loadStoreList();
        }

        // 2. 从Flask后端加载门店列表
        async function loadStoreList() {
            const res = await axios.get("http://localhost:5000/api/merchant/list");
            const stores = res.data.data;
            let html = "";
            stores.forEach(store => {
                html += `
                    <div style="border:1px solid #ccc; padding:10px; margin:10px 0;">
                        <h4>${store.store_name}</h4>
                        <p>地址：${store.store_address}</p>
                        <p>合约地址：${store.contract_address}</p>
                        <button onclick="userDeposit('${store.contract_address}', 1000)">储值1000 USDC</button>
                    </div>
                `;
            });
            document.getElementById("storeList").innerHTML = html;
        }

        // 3. 用户储值（调用门店合约）
        async function userDeposit(storeContractAddress, amount) {
            if (!signer) {
                alert("请先连接钱包");
                return;
            }
            const storeContract = new ethers.Contract(storeContractAddress, storeABI, signer);
            // 先授权USDC给合约
            const usdcContract = new ethers.Contract(
                "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238",
                ["function approve(address spender, uint256 amount) public returns (bool)"],
                signer
            );
            const approveTx = await usdcContract.approve(storeContractAddress, ethers.parseUnits(amount.toString(), 6));
            await approveTx.wait();
            // 调用储值方法
            const depositTx = await storeContract.userDeposit(ethers.parseUnits(amount.toString(), 6));
            await depositTx.wait();
            alert("储值成功！");
        }
